services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rti_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./RTI_Filer/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rti_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./RTI_Filer
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rti_db
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGINS: http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080
      OUTPUTS_DIR: /app/outputs
    volumes:
      - pdf_outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./rti-frontend
      args:
        API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  pdf_outputs:
